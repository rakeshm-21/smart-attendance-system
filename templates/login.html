<!DOCTYPE html>
<html>
<head>

<title>Student Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#eef2f7;
margin:0;
}


/* LOGIN CARD */

.login-container{
width:360px;
margin:120px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
}


/* INPUTS */

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
font-family:Poppins;
}


/* BUTTON */

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}


/* ERROR */

.error{
color:red;
margin-bottom:10px;
}


/* REGISTER LINK */

.register-link{
display:block;
margin-top:15px;
text-decoration:none;
color:#2563eb;
font-weight:500;
}

.register-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">
<h2>Smart Attendance System</h2>
<a href="/">Home</a>
</div>


<!-- LOGIN CARD -->

<div class="login-container">

<h2>Student Login</h2>


{% if error %}
<p class="error">{{error}}</p>
{% endif %}


<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>


<a class="register-link" href="/register">New Student? Register</a>

</div>


</body>
</html>
