<!DOCTYPE html>
<html>

<head>

<title>Face Dataset</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
text-align:center;
background:#f5f5f5;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#4CAF50;
color:white;
}

img{
width:100px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Registered Student Faces</h2>

<table>

<tr>
<th>Name</th>
<th>Roll</th>
<th>Face</th>
</tr>

{% for s in faces %}

<tr>

<td>{{ s.name }}</td>
<td>{{ s.roll }}</td>

<td>
<img src="/{{ s.image }}">
</td>

</tr>

{% endfor %}

</table>

</body>

</html>
