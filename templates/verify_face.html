<!DOCTYPE html>
<html>
<head>

<title>Face Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
font-family:Poppins;
text-align:center;
}

video{
border:4px solid #4CAF50;
border-radius:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

</style>

</head>

<body>

<div class="navbar">
<h2>Smart Attendance System</h2>
<a href="/logout" style="color:white;">Logout</a>
</div>

<h2>Face Verification</h2>

<p>Look at the camera and verify your face</p>

<video id="video" width="320" height="240" autoplay></video>

<br><br>

<button onclick="verify()">Verify Face</button>

<script>

let video = document.getElementById("video");
let stream = null;

// START CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>{
stream = s;
video.srcObject = stream;
})
.catch(err=>{
alert("Camera access failed");
console.error(err);
});


// FUNCTION TO STOP CAMERA
function stopCamera(){

if(stream){
let tracks = stream.getTracks();

tracks.forEach(track=>{
track.stop();
});
}

}


// VERIFY FACE
function verify(){

let canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

let context = canvas.getContext("2d");

context.drawImage(video,0,0,canvas.width,canvas.height);

let image = canvas.toDataURL("image/jpeg");

fetch("/face_verify_api",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:image
})
})
.then(res=>res.json())
.then(data=>{

// SUCCESS
if(data.status==="success"){

alert("Attendance marked for " + data.student);

// stop camera
stopCamera();

// redirect to home page
window.location="/";

}


// ALREADY MARKED
else if(data.status==="already_marked"){

alert("Attendance already marked");

// stop camera
stopCamera();

window.location="/";

}


// FACE FAILED
else if(data.status==="face_failed"){

alert("Face verification failed");

}


// NO FACE DETECTED
else if(data.status==="no_face"){

alert("No face detected");

}


// NO REGISTERED FACE
else if(data.status==="no_registered_face"){

alert("No registered face found");

}


// LOGIN REQUIRED
else if(data.status==="login_required"){

alert("Session expired. Please login again.");

window.location="/student_login";

}


else{

alert("Verification error");

}

})
.catch(err=>{
console.error(err);
alert("Server error");
});

}

</script>

</body>
</html>
